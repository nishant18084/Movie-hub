<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIHAR MOVIE HUB - AI STREAM</title>
    
    <style>
        /* Reset & Base Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding-bottom: 40px;
        }

        /* Top Navbar */
        .navbar {
            background-color: #212121;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #383838;
        }
        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #ff0000;
            letter-spacing: 0.5px;
        }
        .premium-badge {
            font-size: 11px;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            background-color: rgba(0, 255, 204, 0.1);
        }

        /* Main Layout Grid */
        .main-layout {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Video Player Wrapper */
        .video-player-container {
            width: 100%;
            background-color: #000;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2f2f2f;
            box-shadow: 0px 4px 25px rgba(0, 0, 0, 0.8);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Typography info */
        .main-video-info {
            margin: 15px 0;
            padding: 0 5px;
        }
        .main-video-title {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.4;
            color: #f1f1f1;
        }
        .main-video-meta {
            font-size: 13px;
            color: #aaa;
            margin-top: 6px;
        }
        .separator {
            border: 0;
            height: 1px;
            background: #2f2f2f;
            margin: 20px 0;
        }

        /* Grid Layout for Video Tiles */
        .section-heading {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ff0000;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .video-card {
            background-color: #171717;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            border: 1px solid #282828;
        }
        .video-card:hover {
            transform: translateY(-4px);
            border-color: #ff0000;
        }
        .thumbnail-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-size: cover;
            background-position: center;
            background-color: #222;
        }
        .duration-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
        }
        .card-details {
            padding: 12px;
        }
        .card-title {
            font-size: 13px;
            font-weight: bold;
            color: #f1f1f1;
            line-height: 1.3;
            max-height: 34px;
            overflow: hidden;
        }
        .card-channel {
            font-size: 12px;
            color: #aaa;
            margin-top: 6px;
        }

        /* AI Spinner Keyframe Animation */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🔴 BIHAR MOVIE HUB</div>
        <div class="premium-badge">AI SECURE MODE</div>
    </div>

    <div class="main-layout">
        
        <div class="video-player-container">
            <div id="playerStage" style="width:100%; height:100%;">
                </div>
        </div>
        
        <div class="main-video-info">
            <div class="main-video-title" id="currentVideoTitle">Initializing AI Feed...</div>
            <div class="main-video-meta" id="currentVideoDesc">Please wait...</div>
        </div>

        <hr class="separator">

        <div class="section-heading">🔥 Recommended For You (AI Verified)</div>
        <div class="video-grid" id="videoList"></div>
    </div>

    <script>
        // Video List with AI Protection Status Tags
        const moviesDatabase = [
            {
                title: "Khesari Lal Yadav Blockbuster Stage Live Performance 2026",
                desc: "Bhojpuri Superhit Non-Stop HD Stream • 4.2M views",
                youtubeId: "3m0V4C-p3nU", 
                duration: "4:15",
                aiStatus: "Safe" 
            },
            {
                title: "Pawan Singh New Action Dubbed Blockbuster Movie Trailer",
                desc: "Official Teaser Release HD • 980K views",
                youtubeId: "W2X8b0N4tY8",
                duration: "3:40",
                aiStatus: "Safe"
            },
            {
                title: "[WARNING] Misleading News & Clickbait Viral Video Clip",
                desc: "Reported Content - Fake Stream • 12K views",
                youtubeId: "dQw4w9WgXcQ",
                duration: "5:12",
                aiStatus: "Unsafe" // AI Isko screen par block kar dega!
            }
        ];

        // App Init - Render Thumbnails on Grid
        function loadYouTubeClone() {
            const videoListDiv = document.getElementById('videoList');
            if (!videoListDiv) return;

            videoListDiv.innerHTML = ""; 

            moviesDatabase.forEach((movie) => {
                const card = document.createElement('div');
                card.className = "video-card";
                
                // Fetch standard thumbnail image from official YT image host
                const thumbnailSrc = `https://img.youtube.com/vi/${movie.youtubeId}/mqdefault.jpg`;

                card.onclick = () => runAiContentScanner(movie);

                card.innerHTML = `
                    <div class="thumbnail-box" style="background-image: url('${thumbnailSrc}')">
                        <div class="duration-badge">${movie.duration}</div>
                    </div>
                    <div class="card-details">
                        <h4 class="card-title">${movie.title}</h4>
                        <p class="card-channel">${movie.desc}</p>
                    </div>
                `;
                videoListDiv.appendChild(card);
            });

            // Default load first item on boot
            if (moviesDatabase.length > 0) {
                runAiContentScanner(moviesDatabase[0]);
            }
        }

        // Simulated Intelligent AI Layer Filter
        function runAiContentScanner(movie) {
            const playerStage = document.getElementById('playerStage');
            const titleElement = document.getElementById('currentVideoTitle');
            const descElement = document.getElementById('currentVideoDesc');

            // 1. Show AI Loading Layout
            playerStage.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #111; color: #ff0000; text-align: center; padding: 20px;">
                    <div style="border: 4px solid #333; border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
                    <p style="letter-spacing: 1px; font-weight: bold; font-family: monospace;">🤖 AI FILTER: ANALYZING VIDEO FEED...</p>
                    <p style="font-size: 11px; color: #666; margin-top: 5px; font-family: monospace;">Checking metadata, tracking signals and verifying safety tags...</p>
                </div>
            `;
            titleElement.innerText = "Scanning stream data...";
            descElement.innerText = "AI Hub is currently processing the integrity of this media block.";

            // 2. Wait 1.5 seconds for fake analysis calculation before outputting result
            setTimeout(() => {
                if (movie.aiStatus === "Safe") {
                    // Success: Play Video
                    playerStage.innerHTML = `<iframe src="https://www.youtube.com/embed/${movie.youtubeId}?autoplay=1&modestbranding=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                    titleElement.innerHTML = `<span style="color: #00ffcc; font-weight:bold;">[✓ AI SAFE]</span> ${movie.title}`;
                    descElement.innerText = movie.desc;
                } else {
                    // Failure: Render Security Warning Screen
                    playerStage.innerHTML = `
                        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #260a0a; color: #ff4444; padding: 20px; text-align: center; border: 2px solid #ff0000;">
                            <span style="font-size: 45px; margin-bottom: 10px;">⚠️</span>
                            <h3 style="margin: 0; font-family: sans-serif; letter-spacing:1px;">AI SECURITY REJECTION</h3>
                            <p style="font-size: 13px; color: #ffb3b3; margin-top: 10px; max-width: 80%; line-height:1.4;">
                                This content has been flagged as unsafe or misleading by the AI verification module. Connection terminated.
                            </p>
                        </div>
                    `;
                    titleElement.innerHTML = `<span style="color: #ff4444; font-weight:bold;">[❌ AI BLOCKED]</span> Stream Suspended`;
                    descElement.innerText = "Safety Policy Violation detected during system deep scan.";
                }
            }, 1500);
        }

        // Fire system engine on script initialization
        window.onload = loadYouTubeClone;
    </script>
</body>
</html>
