<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIHAR MOVIE HUB - REAL CHATBOT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b111e; color: #ffffff; font-family: Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }
        .gemini-verified-bar {
            width: 100%; background: linear-gradient(90deg, #e11d48, #0f172a);
            border-bottom: 2px solid #f43f5e; padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold;
        }
        .gemini-status { color: #fda4af; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
        .gemini-sparkle { color: #fff; background: linear-gradient(45deg, #e11d48, #3b82f6); padding: 2px 6px; border-radius: 4px; font-size: 10px; }
        
        .chat-container {
            flex: 1; width: 100%; max-width: 600px; background: #0d1624; 
            border-left: 1px solid #1e2d4a; border-right: 1px solid #1e2d4a;
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        .chat-box {
            flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
        }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .msg.user {
            background: #e11d48; color: white; align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .msg.bot {
            background: #151f32; color: #e2e8f0; align-self: flex-start;
            border-bottom-left-radius: 2px; border: 1px solid #233554;
        }
        
        .options-wrapper {
            padding: 10px 15px; background: #0d1624; border-top: 1px solid #1e2d4a;
            display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
        }
        .options-wrapper::-webkit-scrollbar { display: none; }
        
        .opt-btn {
            background: #151f32; color: #fda4af; border: 1px solid #233554;
            padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: bold;
            cursor: pointer; transition: 0.2s; display: inline-block;
        }
        .opt-btn:hover {
            background: #e11d48; color: white; border-color: #e11d48;
        }

        .typing-indicator { color: #8fa0dd; font-size: 12px; padding: 8px 15px; display: none; align-self: flex-start; }

        .input-area {
            background: #151f32; border-top: 1px solid #233554; padding: 12px;
            display: flex; gap: 10px; width: 100%;
        }
        input {
            flex: 1; background: #0b111e; border: 1px solid #233554; border-radius: 25px;
            padding: 12px 18px; color: #fff; font-size: 14px; outline: none;
        }
        input:focus { border-color: #e11d48; }
        
        button {
            background: #e11d48; color: white; border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 16px; transition: 0.2s;
        }
        button:hover { background: #be123c; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="gemini-verified-bar">
        <div class="gemini-status"><span class="gemini-sparkle">✦ MOVIE HUB</span><span>LIVE CHAT TERMINAL</span></div>
        <div style="color: #10b981; font-size: 11px;">🟢 BOT ONLINE</div>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="msg bot">👋 Hello Bhai! Main Bihar Movie Hub ka official AI buddy hoon. Kuch bhi type karo (jaise hlo, hi ya koi film) ya niche se option chuno, main turant jawab dunga!</div>
        </div>
        
        <div class="typing-indicator" id="typing">Bot typing...</div>

        <div class="options-wrapper">
            <div class="opt-btn" onclick="selectOption('Bhojpuri hit movies list')">🎭 Bhojpuri Hits</div>
            <div class="opt-btn" onclick="selectOption('Best South Action Movies')">🔥 South Action</div>
            <div class="opt-btn" onclick="selectOption('Top 5 Web Series')">📺 Web Series</div>
            <div class="opt-btn" onclick="selectOption('Hollywood Sci-Fi movies')">🚀 Hollywood</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Yahan 'hlo' ya apna sawal likhein..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        let conversationContext = "You are a friendly, cool AI expert for Bihar Movie Hub website. Talk nicely in brief Hinglish/Hindi like a friend.";

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function selectOption(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const userText = inputField.value.trim();
            const chatBox = document.getElementById('chatBox');
            const typingIndicator = document.getElementById('typing');

            if (!userText) return;

            // 1. User text print karein
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = userText;
            chatBox.appendChild(userDiv);
            
            inputField.value = ''; 
            chatBox.scrollTop = chatBox.scrollHeight; 

            // Show Typing Indicator
            typingIndicator.style.display = 'block';

            // Fixed URL Encoding logic
            const systemPrompt = `${conversationContext} User said: "${userText}". Reply back directly as the bot.`;
            const cleanUrl = `https://text.pollinations.ai/${encodeURIComponent(systemPrompt)}?system=You are a friendly movie assistant.`;

            try {
                const response = await fetch(cleanUrl);
                if (!response.ok) throw new Error();
                
                const botReply = await response.text();
                typingIndicator.style.display = 'none';

                // 2. Bot text print karein
                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                botDiv.innerText = botReply.replace(/\*\*/g, ""); 
                chatBox.appendChild(botDiv);
                
                // Update short term system context memory
                conversationContext += ` User: ${userText}. Bot: ${botReply}.`;
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                typingIndicator.style.display = 'none';
                const botDiv = document.createElement('div');
                botDiv.className = 'msg bot';
                botDiv.innerText = "Haan bhai! Kaise ho? Sab badhiya chal raha hai na, batao kya help chahiye aaj?";
                chatBox.appendChild(botDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
